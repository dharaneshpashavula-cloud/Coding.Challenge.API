name: CI Build and Deploy

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Run tests
      run: dotnet test --no-build --verbosity normal

    - name: Log in to registry
      if: github.event.repository.private == false
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build Docker image
      run: |
        docker build -t ghcr.io/${{ github.repository_owner }}/${{ github.repository }}:latest ./Coding.Challenge.API

    - name: Push Docker image
      if: github.event.repository.private == false
      run: |
        docker tag ghcr.io/${{ github.repository_owner }}/${{ github.repository }}:latest ghcr.io/${{ github.repository_owner }}/${{ github.repository }}:v${{ github.run_number }}
        docker push ghcr.io/${{ github.repository_owner }}/${{ github.repository }}:latest
        docker push ghcr.io/${{ github.repository_owner }}/${{ github.repository }}:v${{ github.run_number }}

  deploy-to-staging:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Deploy to staging (placeholder)
      run: echo "Deploy to staging environment would run here. Configure your environment-specific deployment steps."
